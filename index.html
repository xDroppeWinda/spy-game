<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Игра "Шпион" - Brawl Stars</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #1e1e2f;
        color: white;
    }
    h1 {
        margin-top: 20px;
    }
    button {
        padding: 10px 20px;
        font-size: 18px;
        margin: 10px;
        cursor: pointer;
        border: none;
        border-radius: 10px;
    }
    .start { background-color: #4CAF50; color: white; }
    .next { background-color: #2196F3; color: white; }
    .card {
        margin-top: 20px;
        font-size: 24px;
        padding: 20px;
        background-color: #333;
        border-radius: 15px;
        display: inline-block;
        min-width: 300px;
    }
</style>
</head>
<body>

<h1>Игра "Шпион" (Brawl Stars)</h1>

<button class="start" onclick="startGame()">Начать игру</button>
<br>
<button class="next" onclick="nextPlayer()" id="nextBtn" style="display:none;">Следующий игрок</button>

<div class="card" id="card">Нажмите "Начать игру"</div>

<script>
const characters = [
"Шелли", "Кольт", "Булл", "Джесси", "Брок", 
"Динамайк", "Бо", "Тик", "8-Бит",
"Эмз", "Сту", "Пайпер", "Пэм",
"Фрэнк", "Биби", "Эдгар", "Грифф",
"Гас", "Спайк", "Леон", "Ворон",
"Сэнди", "Амбер", "Мэг", "Честер"
];

let selectedCharacter = "";
let spyIndex = 0;
let currentPlayer = 1;
const totalPlayers = 4;

function startGame() {
    selectedCharacter = characters[Math.floor(Math.random() * characters.length)];
    spyIndex = Math.floor(Math.random() * totalPlayers) + 1;
    currentPlayer = 1;

    document.getElementById("nextBtn").style.display = "inline-block";
    document.getElementById("card").innerHTML = 
        "Игрок 1<br><br><button onclick='revealRole()'>Показать роль</button>";
}

function revealRole() {
    let text = "";
    if (currentPlayer === spyIndex) {
        text = "🤫 Ты шпион!";
    } else {
        text = "Твой персонаж: <br><b>" + selectedCharacter + "</b>";
    }

    document.getElementById("card").innerHTML = 
        text + "<br><br><button onclick='hideRole()'>Скрыть</button>";
}

function hideRole() {
    if (currentPlayer < totalPlayers) {
        currentPlayer++;
        document.getElementById("card").innerHTML = 
            "Игрок " + currentPlayer + 
            "<br><br><button onclick='revealRole()'>Показать роль</button>";
    } else {
        document.getElementById("card").innerHTML = 
            "Игра окончена!<br>Шпион был: Игрок " + spyIndex +
            "<br><br><button onclick='startGame()'>Играть снова</button>";
    }
}
</script>

</body>
</html>
